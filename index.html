<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Learning Hub</title>
</head>
<body><h1>Student Learning Hub</h1>
<form action="#">

    <p>SIGN UP</p>
    <label for="name">
        <input type="text" placeholder="Name"name="Name">
    </label>
    <br><br>
    <label for="Email">
        <input type="email" placeholder="Email"name="Email">
    </label>
    <br><br>
    <label for="Pass">
        <input type="password" placeholder="Password" name="Password">
    </label>
    <br>
    <p>Enter your gender:</p>
    <label for="gender1">
        <input type="radio" value="Male" name="Gender">Male
    </label>
    <br>
    <label for="gender2">
        <input type="radio" value="Female" name="Gender">Female
    </label>
    <br>
    <label for="gender3">
        <input type="radio" value="others" name="Gender">Others
    </label>
    <br>
    <p>Enter your course:</p>
    <select name="course">
        <option value="c++">c++</option>
        <option value="java">java</option>
        <option value="DSA">DSA</option>
        <option value="Web Development">Web Development</option>
    </select>
    <br>
    <p>Enter your skills:</p>
    <label for="HTML">
        <input type="checkbox" value="HTML" name="skills" id="HTML">HTML
    </label>
    <br>
    <label for="CSS">
        <input type="checkbox" value="CSS" name="skills" id="CSS">CSS
    </label>
    <br>
    <label for="JS">
        <input type="checkbox" value="JS" name="skills" id="JS">JS
    </label>
    <br><br>
    <input type="date"  name="DOB">
    <br><br>
    <input type="tel" placeholder=phone name="phone">
    <br><br>
    <input type="submit" value="submit" name="submit">
    
    <input type="reset" value="reset" name="reset">
    <p>Already have an account?Login</p>
</form>
    <br>
    <a href="Home.html">Home</a>
    <br><br>
    <a href="Course.html">Course</a>
    <br><br>
    <a href="Contact.html">Contact</a>
    <br><br>
    
</body>
</html>
